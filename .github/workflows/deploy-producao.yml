# Deploy automatico em producao (GitHub Actions + self-hosted runners)
#
# Gatilho: push em main ou execucao manual (workflow_dispatch).
# Cada job roda no runner da unidade (label = matrix.site).
#
# Novas unidades: instale runner com nova label e adicione o id em matrix.site.

name: Deploy producao

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  APP_PATH: C:\inetpub\wwwroot\controle-acesso-PAMC

jobs:
  deploy:
    name: Deploy ${{ matrix.site }}
    runs-on: [self-hosted, windows, ${{ matrix.site }}]
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        site: [pamc, cpbv, cpfbv]

    steps:
      - name: Verificar pasta do app
        shell: powershell
        run: |
          if (-not (Test-Path $env:APP_PATH)) {
            throw "Pasta do app nao encontrada: $env:APP_PATH"
          }
          if (-not (Test-Path (Join-Path $env:APP_PATH 'update_app.bat'))) {
            throw "update_app.bat ausente em $env:APP_PATH"
          }
          Write-Host "App OK: $env:APP_PATH"

      - name: Executar update_app.bat
        shell: cmd
        run: call "%APP_PATH%\update_app.bat"

      - name: Exibir log do update
        if: always()
        shell: powershell
        run: |
          $log = Join-Path $env:APP_PATH 'logs\update.log'
          if (Test-Path $log) {
            Write-Host '--- logs\update.log (ultimas 30 linhas) ---'
            Get-Content $log -Tail 30
          } else {
            Write-Warning "Log nao encontrado: $log"
          }
